# Link with: supabase link --project-ref <your-ref>
# Apply SQL: supabase db push
# Deploy: supabase functions deploy private-note
#
# Gateway JWT verification is off for private-note: the Edge handler already
# requires Authorization and runs supabase.auth.getUser(). Kong-level verify_jwt
# often returns "Invalid JWT" for otherwise valid sessions (e.g. some token shapes).

[functions.private-note]
verify_jwt = false
